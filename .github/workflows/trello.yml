name: trelloci

on:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Install dependencies
        run: npm ci

      - name: Run Linter
        run: npm run lint

      - name: Run Tests
        run: npm test

      - name: Update Trello on Success
        if: success()
        run: |
          curl -X PUT "https://api.trello.com/1/cards/${{ secrets.TRELLO_CARD_ID }}" \
          -d "name=CI Passed - $(date)" \
          -d "key=${{ secrets.TRELLO_KEY }}" \
          -d "token=${{ secrets.TRELLO_TOKEN }}"